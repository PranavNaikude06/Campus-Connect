
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans); }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 1rem 0 0; }
  .tab { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: #00e5ff; color: #03050d; border-color: #00e5ff; font-weight: 500; }
  .preview { background: #03050d; border-radius: 12px; height: 340px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 0.5px solid rgba(0,229,255,0.15); }
  .label-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .design-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .design-tip { font-size: 12px; color: var(--color-text-secondary); }

  /* ── Design 1: Orbital Ring ── */
  .d1 { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .d1-ring { position: relative; width: 90px; height: 90px; }
  .d1-ring svg { animation: spin 1.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .d1-logo { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #00e5ff; letter-spacing: 0.5px; }
  .d1-text { text-align: center; }
  .d1-text h2 { font-size: 18px; font-weight: 700; color: #dff0fc; letter-spacing: -0.5px; }
  .d1-text h2 span { color: #00e5ff; }
  .d1-text p { font-size: 11px; color: #556e85; margin-top: 4px; letter-spacing: 1.5px; text-transform: uppercase; }
  .d1-dots { display: flex; gap: 6px; }
  .d1-dots span { width: 5px; height: 5px; border-radius: 50%; background: #00e5ff; animation: pulse 1.2s ease-in-out infinite; }
  .d1-dots span:nth-child(2) { animation-delay: 0.2s; }
  .d1-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

  /* ── Design 2: Progress Bar ── */
  .d2 { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 260px; }
  .d2-logo { font-size: 22px; font-weight: 800; color: #dff0fc; letter-spacing: -1px; }
  .d2-logo span { color: #00e5ff; }
  .d2-sub { font-size: 10px; color: #556e85; letter-spacing: 2px; text-transform: uppercase; margin-top: -20px; }
  .d2-bar-wrap { width: 100%; }
  .d2-label { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .d2-label span { font-size: 11px; color: #556e85; }
  .d2-label .pct { color: #00e5ff; font-weight: 600; }
  .d2-track { height: 3px; background: rgba(0,229,255,0.1); border-radius: 100px; overflow: hidden; }
  .d2-fill { height: 100%; background: #00e5ff; border-radius: 100px; animation: load 2.8s ease-in-out infinite; }
  @keyframes load { 0% { width: 0%; } 85% { width: 95%; } 100% { width: 100%; } }
  .d2-msg { font-size: 11px; color: #556e85; animation: fadeMsg 2.8s ease-in-out infinite; }
  @keyframes fadeMsg { 0%,40% { opacity: 1; } 50%,90% { opacity: 0.3; } 100% { opacity: 1; } }

  /* ── Design 3: Morphing Logo ── */
  .d3 { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .d3-icon { position: relative; width: 72px; height: 72px; }
  .d3-icon svg circle:nth-child(1) { animation: morph1 2s ease-in-out infinite alternate; }
  .d3-icon svg circle:nth-child(2) { animation: morph2 2s ease-in-out infinite alternate; }
  .d3-icon svg circle:nth-child(3) { animation: morph3 2s ease-in-out infinite alternate; }
  @keyframes morph1 { from { r: 11; opacity: 0.6; } to { r: 11; opacity: 1; } }
  @keyframes morph2 { from { r: 4.5; opacity: 0.9; } to { r: 6; opacity: 0.7; } }
  @keyframes morph3 { from { r: 1.8; } to { r: 2.8; } }
  .d3-name { font-size: 20px; font-weight: 800; color: #dff0fc; letter-spacing: -1px; }
  .d3-name span { color: #00e5ff; }
  .d3-scan { width: 200px; height: 1px; background: rgba(0,229,255,0.08); position: relative; overflow: hidden; border-radius: 1px; }
  .d3-scan::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, #00e5ff, transparent); animation: scan 1.8s ease-in-out infinite; }
  @keyframes scan { from { transform: translateX(-100%); } to { transform: translateX(200%); } }
  .d3-tag { font-size: 10px; color: #556e85; letter-spacing: 2px; text-transform: uppercase; }

  /* ── Design 4: Grid Reveal ── */
  .d4 { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .d4-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .d4-cell { width: 14px; height: 14px; border-radius: 3px; background: rgba(0,229,255,0.08); border: 0.5px solid rgba(0,229,255,0.12); }
  .d4-cell.on { background: rgba(0,229,255,0.5); border-color: #00e5ff; }
  .d4-text { text-align: center; }
  .d4-text h3 { font-size: 17px; font-weight: 700; color: #dff0fc; letter-spacing: -0.5px; }
  .d4-text h3 span { color: #00e5ff; }
  .d4-text p { font-size: 10px; color: #556e85; margin-top: 4px; letter-spacing: 1.5px; text-transform: uppercase; }
  .d4-status { font-size: 11px; color: rgba(0,229,255,0.6); }

  /* ── Design 5: Minimal Counter ── */
  .d5 { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .d5-num { font-size: 80px; font-weight: 800; color: #00e5ff; line-height: 1; letter-spacing: -4px; font-variant-numeric: tabular-nums; }
  .d5-pct { font-size: 28px; font-weight: 300; color: rgba(0,229,255,0.5); }
  .d5-rule { width: 1px; height: 48px; background: rgba(0,229,255,0.2); }
  .d5-brand { font-size: 13px; font-weight: 500; color: #dff0fc; letter-spacing: 3px; text-transform: uppercase; }
  .d5-brand span { color: #00e5ff; }
  .d5-caption { font-size: 10px; color: #556e85; letter-spacing: 1.5px; text-transform: uppercase; }
</style>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="show(0)">Orbital Ring</div>
  <div class="tab" onclick="show(1)">Progress Bar</div>
  <div class="tab" onclick="show(2)">Scanning Logo</div>
  <div class="tab" onclick="show(3)">Grid Reveal</div>
  <div class="tab" onclick="show(4)">Bold Counter</div>
</div>

<div class="preview" id="preview"></div>

<div class="label-bar">
  <span class="design-name" id="dname">Orbital Ring</span>
  <span class="design-tip" id="dtip">Great for auth / initial load</span>
</div>

<script>
const designs = [
  {
    name: 'Orbital Ring',
    tip: 'Great for auth / initial load',
    html: `<div class="d1">
      <div class="d1-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(0,229,255,0.08)" stroke-width="2"/>
          <circle cx="45" cy="45" r="38" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"
            stroke-dasharray="60 180" stroke-dashoffset="0"/>
          <circle cx="45" cy="45" r="28" fill="none" stroke="rgba(0,229,255,0.05)" stroke-width="1"/>
          <circle cx="45" cy="45" r="28" fill="none" stroke="rgba(0,229,255,0.4)" stroke-width="1"
            stroke-dasharray="30 150" stroke-dashoffset="90"/>
        </svg>
        <div class="d1-logo">CC</div>
      </div>
      <div class="d1-text">
        <h2>Campus<span>Connect</span></h2>
        <p>Terna Engineering College</p>
      </div>
      <div class="d1-dots"><span></span><span></span><span></span></div>
    </div>`
  },
  {
    name: 'Progress Bar',
    tip: 'Works well when loading real data',
    html: `<div class="d2">
      <div>
        <div class="d2-logo">Campus<span>Connect</span></div>
        <div class="d2-sub">Terna Engineering College</div>
      </div>
      <div class="d2-bar-wrap">
        <div class="d2-label"><span>Loading events</span><span class="pct">—</span></div>
        <div class="d2-track"><div class="d2-fill"></div></div>
      </div>
      <div class="d2-msg">Setting up your dashboard...</div>
    </div>`
  },
  {
    name: 'Scanning Logo',
    tip: 'Sleek, modern feel — very on-brand',
    html: `<div class="d3">
      <div class="d3-icon">
        <svg viewBox="0 0 26 26" width="72" height="72" fill="none">
          <circle cx="13" cy="13" r="11" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
          <circle cx="13" cy="13" r="4.5" fill="#00e5ff" opacity="0.9"/>
          <circle cx="13" cy="13" r="1.8" fill="#03050d"/>
        </svg>
      </div>
      <div class="d3-name">Campus<span>Connect</span></div>
      <div class="d3-scan"></div>
      <div class="d3-tag">Initializing portal</div>
    </div>`
  },
  {
    name: 'Grid Reveal',
    tip: 'Unique — great for a student portal vibe',
    html: `<div class="d4">
      <div class="d4-grid" id="g4"></div>
      <div class="d4-text">
        <h3>Campus<span>Connect</span></h3>
        <p>Loading your events</p>
      </div>
    </div>`
  },
  {
    name: 'Bold Counter',
    tip: 'High impact — pairs with real load %',
    html: `<div class="d5">
      <div class="d5-num" id="cnum">0<span class="d5-pct">%</span></div>
      <div class="d5-rule"></div>
      <div class="d5-brand">Campus<span>Connect</span></div>
      <div class="d5-caption">Terna Engineering College</div>
    </div>`
  }
];

let activeTimer = null;
let gridTimer = null;
let countTimer = null;

function clearTimers() {
  clearInterval(activeTimer);
  clearInterval(gridTimer);
  clearInterval(countTimer);
}

function show(i) {
  clearTimers();
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.getElementById('dname').textContent = designs[i].name;
  document.getElementById('dtip').textContent = designs[i].tip;
  document.getElementById('preview').innerHTML = designs[i].html;

  if (i === 3) startGrid();
  if (i === 4) startCounter();
}

function startGrid() {
  const g = document.getElementById('g4');
  if (!g) return;
  const cells = [];
  for (let k = 0; k < 25; k++) {
    const c = document.createElement('div');
    c.className = 'd4-cell';
    g.appendChild(c);
    cells.push(c);
  }
  let on = 0;
  gridTimer = setInterval(() => {
    cells.forEach(c => c.classList.remove('on'));
    on = (on + 1) % 26;
    for (let k = 0; k < on; k++) cells[k].classList.add('on');
    if (on === 25) { clearInterval(gridTimer); setTimeout(startGrid, 400); }
  }, 100);
}

function startCounter() {
  let v = 0;
  const el = document.getElementById('cnum');
  countTimer = setInterval(() => {
    v = Math.min(v + Math.floor(Math.random() * 4) + 1, 100);
    if (el) el.innerHTML = v + '<span class="d5-pct">%</span>';
    if (v >= 100) { clearInterval(countTimer); setTimeout(startCounter, 600); }
  }, 60);
}

show(0);
</script>
